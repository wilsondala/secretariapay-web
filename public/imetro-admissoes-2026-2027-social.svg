    <circle cx="142" cy="142" r="118" fill="#0B284D" stroke="#F4B400" stroke-opacity=".5" stroke-width="3"/>
    <path d="m142 62-86 41 86 41 70-33.5v51h16V103L142 62Z" fill="url(#gold)"/>
    <path d="M91 132v40c0 31 23 53 51 53s51-22 51-53v-40l-51 25-51-25Z" fill="url(#blue)"/>
