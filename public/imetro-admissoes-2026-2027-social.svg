<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Abertura do Ano Letivo 2026/2027 — IMETRO</title>
  <desc id="desc">Imagem institucional para compartilhamento do portal de inscrições do Instituto Superior Politécnico Metropolitano de Angola.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#041329"/>
      <stop offset="0.55" stop-color="#071A35"/>
      <stop offset="1" stop-color="#0A3968"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF1A6"/>
      <stop offset="0.38" stop-color="#F4B400"/>
      <stop offset="1" stop-color="#BD7910"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#28B5F5"/>
      <stop offset="1" stop-color="#0878BD"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity=".38"/>
    </filter>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#FFFFFF" stroke-opacity=".035"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1110" cy="45" r="330" fill="#1194DD" fill-opacity=".12"/>
  <circle cx="90" cy="650" r="300" fill="#F4B400" fill-opacity=".11"/>
  <path d="M0 522 1200 326v304H0Z" fill="#031126" fill-opacity=".62"/>

  <g transform="translate(78 72)">
    <rect width="184" height="58" rx="29" fill="#FFFFFF" fill-opacity=".08" stroke="#FFFFFF" stroke-opacity=".17"/>
    <circle cx="31" cy="29" r="18" fill="url(#blue)"/>
    <path d="m31 18-13 6.3L31 31l11-5.3v8h3V24.3L31 18Z" fill="#FFFFFF"/>
    <text x="61" y="36" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#FFFFFF">ADMISSÕES</text>
  </g>

  <g transform="translate(78 178)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" letter-spacing="4" fill="#7DD3FC">ABERTURA DO ANO LETIVO</text>
    <text x="0" y="92" font-family="Manrope, Inter, Arial, sans-serif" font-size="92" font-weight="900" letter-spacing="-4" fill="url(#gold)">2026/2027</text>
    <rect y="122" width="714" height="3" rx="2" fill="#F4B400" fill-opacity=".72"/>
    <text x="0" y="179" font-family="Manrope, Inter, Arial, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF">INSTITUTO SUPERIOR POLITÉCNICO</text>
    <text x="0" y="225" font-family="Manrope, Inter, Arial, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF">METROPOLITANO DE ANGOLA</text>
    <text x="0" y="272" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="8" fill="#F4B400">IMETRO</text>
