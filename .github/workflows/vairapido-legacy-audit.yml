name: Auditoria completa de domínio legado

on:
  push:
    branches:
      - chore/remove-vairapido-legacy-before-production
  pull_request:
    branches:
      - feat/public-admissions-portal-2026-2027
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Criar snapshot completo
        shell: bash
        run: |
          tar --exclude='./.git' \
              --exclude='./secretariapay-web-complete-source.tar.gz' \
              -czf secretariapay-web-complete-source.tar.gz .

      - name: Publicar snapshot
        uses: actions/upload-artifact@v4
        with:
          name: secretariapay-web-complete-source
          path: secretariapay-web-complete-source.tar.gz
          if-no-files-found: error
          retention-days: 1
