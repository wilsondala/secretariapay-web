name: Auditoria legado VaiRapido

on:
  push:
    branches:
      - chore/remove-vairapido-legacy-before-production
  pull_request:
    branches:
      - feat/public-admissions-portal-2026-2027
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Gerar relatório da auditoria
        shell: bash
        run: |
          set -u
          REPORT=legacy-vairapido-frontend.txt
          {
            echo '===== CANDIDATOS POR NOME DE FICHEIRO ====='
            find . -type f \
              ! -path './.git/*' \
              ! -path './node_modules/*' \
              ! -path './dist/*' \
              | sort \
              | grep -Ei '/(transport|route|trip|passenger|booking|ticket|boarding|multicountry|company)' \
              || true

            echo
            echo '===== FICHEIROS COM REFERENCIA EXPLICITA AO VAIRAPIDO ====='
            grep -RIlE --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=dist \
              'VaiR[aá]pido|vairapido|VAI_RAPIDO|VAIRAPIDO' . \
              | sort || true

            echo
            echo '===== FICHEIROS COM IDENTIFICADORES DO DOMINIO DE TRANSPORTE ====='
            grep -RIlE --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=dist \
              'transportCompany|transport-companies|/trips|/passengers|/bookings|/tickets|/routes|boarding|multi-country|COMPANY_ADMIN|ROLE_COMPANY_ADMIN|ROLE_OPERATOR|busPlate|vehicleDescription|originCity|destinationCity|seatNumber' \
              src public index.html package.json README.md .env.example 2>/dev/null \
              | sort || true

            echo
            echo '===== CONTAGEM ====='
            printf 'Ficheiros do repositorio: '
            find . -type f ! -path './.git/*' ! -path './node_modules/*' ! -path './dist/*' | wc -l
            printf 'Candidatos legados por nome: '
            find . -type f ! -path './.git/*' ! -path './node_modules/*' ! -path './dist/*' \
              | grep -Eic '/(transport|route|trip|passenger|booking|ticket|boarding|multicountry|company)' \
              || true
          } > "$REPORT"

          tar -czf secretariapay-web-audit-source.tar.gz \
            src public .github package.json package-lock.json index.html README.md \
            .env.example .gitignore vite.config.js tailwind.config.js postcss.config.js 2>/dev/null

          cat "$REPORT"

      - name: Publicar relatório e fonte da auditoria
        uses: actions/upload-artifact@v4
        with:
          name: legacy-vairapido-frontend-source
          path: |
            legacy-vairapido-frontend.txt
            secretariapay-web-audit-source.tar.gz
          if-no-files-found: error
          retention-days: 7
